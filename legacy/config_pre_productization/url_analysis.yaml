url_analysis:
  use_youtube_api: true
  use_ytdlp_metadata: true
  use_webpage_metadata: true
  use_cookie: false
  max_description_chars: 1500
  include_thumbnails: true
  include_tags: true
  include_format_info: true
  skip_unavailable: false

review_export:
  output_csv: output/review/review_sheet.csv
  output_md: output/review/review_sheet.md
  include_llm_reason: true
  include_quality_score: true

feedback_analysis:
  min_sample_size_for_strategy: 20
  high_pass_rate_threshold: 0.4
  low_pass_rate_threshold: 0.1
  min_count_for_keyword_stats: 3
