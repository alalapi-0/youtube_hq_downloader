negative_keyword_sources:
  negative_keywords_file: config/negative_keywords.yaml

brand_positive_keywords_file: config/brand_whitelist.yaml

duration:
  min_seconds: 45
  max_seconds: 7200

shorts:
  exclude: true

live:
  exclude: true

ai_content:
  reject_on_keyword_hit: true

low_value_content:
  reject_on_keyword_hit: true

# 高风险视觉口径：命中后打标并可抬升人工复核优先级；默认不因单独命中硬拒绝
high_risk_visual:
  tag_only: true
  escalate_manual_review_priority: true

resolution:
  require_4k: false
  min_height: null
  allow_text_evidence_when_format_unknown: true
  allow_format_probe: true

dedupe:
  by_video_id: true
  category_scope_field: category_subcategory
  max_per_channel: 1
  channel_whitelist_file: config/channel_whitelist.yaml
  whitelist_max_per_channel: 3

# 打分与排序（软信号；与硬阈值分离）
ranking:
  penalize_high_motion_content: true
  prefer_static_product_visuals: true
  high_motion_tokens:
    - " pov "
    - "parkour"
    - "gaming highlights"
    - "fast paced"
    - "montage"
    - "hyperlapse"
  static_product_tokens:
    - "studio lighting"
    - "macro"
    - "slow pan"
    - "still life"
    - "beauty shot"

manual_review:
  default_priority: medium
  prefer_text_only_4k_claims: true
