manual_status:
  - pending
  - pass
  - reject
  - uncertain

reject_reasons:
  visual_quality:
    - noise_too_heavy
    - compression_blocks
    - color_banding
    - low_resolution
    - underexposed
    - overexposed
    - motion_blur
    - poor_dynamic_quality
    - watermark_or_subtitle_blocking
  content_type:
    - ai_generated
    - review_or_unboxing
    - vlog_or_user_content
    - fanmade_or_compilation
    - live_or_full_show
    - behind_the_scenes
    - not_advertisement
    - not_product_focused
  metadata:
    - not_4k
    - duration_too_short
    - duration_too_long
    - channel_not_official
    - duplicate_channel
    - unavailable
  other:
    - copyright_risk
    - irrelevant
    - other

pass_features:
  - official_brand_channel
  - official_campaign
  - product_focused
  - clean_studio_visual
  - luxury_aesthetic
  - low_motion
  - clear_subject
  - high_resolution_confirmed
  - good_lighting
  - strong_commercial_style
  - minimal_watermark
  - suitable_for_qt

review_fields:
  required:
    - manual_review.status
    - manual_review.passed
  optional:
    - manual_review.reject_reasons
    - manual_review.notes
    - manual_review.reviewer
    - manual_review.reviewed_at
