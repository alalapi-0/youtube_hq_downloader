negative_keywords:
  ai_content:
    - "generated by ai"
    - "chatgpt"
    - "gpt-4"
    - "midjourney"
    - "stable diffusion"
    - "voice clone"
    - "deepfake"
  low_value_content:
    - "youtube shorts"
    - "subscribe now"
    - "smash like"
    - "giveaway"
    - "follow for part 2"
    - "free robux"
  high_risk:
    - "handheld"
    - "shaky cam"
    - "vlog"
    - "reaction video"
    - "screen recording"
    - "tiktok compil"
    - "parkour pov"
    - "dashcam"
    - "body cam footage"
    - "review"
    - "unboxing"
    - "behind the scenes"
    - "compilation"

duration:
  min_seconds: 20
  max_seconds: 180

shorts:
  exclude: true

live:
  exclude: true

ai_content:
  reject_on_keyword_hit: true

low_value_content:
  reject_on_keyword_hit: true

high_risk_visual:
  tag_only: true
  escalate_manual_review_priority: true

resolution:
  require_4k: true
  min_height: 2160
  allow_text_evidence_when_format_unknown: true
  allow_format_probe: true

dedupe:
  by_video_id: true
  category_scope_field: category_subcategory
  max_per_channel: 1
  whitelist_max_per_channel: 3
  channel_whitelist:
    channel_ids: []
    channel_title_contains: []

ranking:
  penalize_high_motion_content: true
  prefer_static_product_visuals: true
  high_motion_tokens:
    - " pov "
    - "parkour"
    - "gaming highlights"
    - "fast paced"
    - "montage"
    - "hyperlapse"
    - "vlog"
  static_product_tokens:
    - "studio lighting"
    - "macro"
    - "slow pan"
    - "still life"
    - "beauty shot"
    - "packshot"

manual_review:
  default_priority: medium
  prefer_text_only_4k_claims: true
