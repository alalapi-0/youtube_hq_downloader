app:
  name: ad-url-scout
  title: Ad URL Scout
  description: AI 增强广告视频 URL 寻源工具
  mode: ai_first
  language: zh

llm:
  enabled: true
  provider: openrouter
  model: google/gemini-2.5-flash
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  temperature: 0.2
  max_output_tokens: 4096
  cache_enabled: true
  cache_dir: cache/llm
  prompt_version: ad-url-scout-v1
  max_items_per_batch: 20

youtube:
  api_key_env: YOUTUBE_API_KEY
  use_youtube_api: true
  use_ytdlp_metadata: true
  use_format_probe: true
  use_webpage_metadata: true
  default_region_code: US
  default_relevance_language: en
  default_max_results_per_query: 10

tasks:
  output_root: output/tasks
  default_category: campaigns
  default_subcategory: product
  review_sheet_name: review_sheet.csv
  markdown_review_name: review_sheet.md
  offline_mode: false

review:
  min_sample_size_for_strategy: 20
  high_pass_rate_threshold: 0.4
  low_pass_rate_threshold: 0.1
  min_count_for_keyword_stats: 3

advanced:
  use_cookie: false
  cookie_file: ""
  cookies_from_browser: ""
  never_log_cookie_content: true
