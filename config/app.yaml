app:
  name: ad-url-scout
  title: Ad URL Scout
  description: YouTube 搜索结果页 URL 采集与 4K 筛选工具
  language: zh

youtube:
  max_entries_per_search_page: 80
  metadata_timeout_seconds: 90
  cookies_enabled: false
  cookie_file: ""
  cookies_from_browser: ""

filters:
  require_4k: true
  min_height: 2160
  max_duration_seconds: 60
  published_within_days: 730
  reject_if_missing_4k_evidence: true
  reject_if_missing_duration: true
  reject_if_missing_publish_date: true
  negative_keywords:
    - ai generated
    - ai-generated
    - artificial intelligence
    - review
    - unboxing
    - vlog
    - behind the scenes
    - bts
    - compilation
    - showreel
    - reel
    - reupload
    - fanmade
    - full show
    - full film
    - interview
    - tutorial
    - reaction
    - news

tasks:
  output_root: output/tasks
  review_sheet_name: review_sheet.csv
  markdown_review_name: review_sheet.md

review:
  min_sample_size_for_strategy: 20
  high_pass_rate_threshold: 0.4
  low_pass_rate_threshold: 0.1
  min_count_for_keyword_stats: 3
